name: ultra_sync
description: Ultra-Sync Super App — Logistics, Wallet, and Real-time Chat
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.5
  bloc: ^8.1.4
  equatable: ^2.0.5

  # Dependency Injection
  get_it: ^7.6.7
  injectable: ^2.3.2

  # Network
  dio: ^5.4.3

  # Local Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3

  # Routing
  go_router: ^14.0.1

  # Code Generation helpers
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Maps & Location
  google_maps_flutter: ^2.6.1
  geolocator: ^11.0.0

  # Biometrics
  local_auth: ^2.1.8

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.1.1

  # WebSocket
  web_socket_channel: ^3.0.0

  # UI utilities
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  gap: ^3.0.1
  fpdart: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  freezed: ^2.4.6
  json_serializable: ^6.7.6
  injectable_generator: ^2.4.1
  bloc_test: ^9.1.7
  mocktail: ^1.0.3
  patrol: ^3.10.0
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
