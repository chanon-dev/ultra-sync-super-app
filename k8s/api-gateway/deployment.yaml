apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: ultra-sync
  labels:
    app: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: api-gateway
          image: ghcr.io/chanon/ultra-sync/api-gateway:latest
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 9090
              name: metrics
          env:
            - name: AUTH_SERVICE_URL
              value: "http://auth-svc.ultra-sync.svc.cluster.local:8081"
            - name: LOGISTICS_SERVICE_URL
              value: "http://logistics-svc.ultra-sync.svc.cluster.local:8082"
            - name: WALLET_SERVICE_URL
              value: "http://wallet-svc.ultra-sync.svc.cluster.local:8083"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://jaeger.ultra-sync.svc.cluster.local:4318"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
