{{- $svc := .Values.apiGateway -}}
{{- $g   := .Values.global -}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: {{ $g.namespace }}
  labels:
    {{- include "ultra-sync.labels" . | nindent 4 }}
    app: api-gateway
spec:
  replicas: {{ $svc.replicaCount }}
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: api-gateway
          image: {{ include "ultra-sync.image" (dict "registry" $g.imageRegistry "image" $svc.image "tag" $g.imageTag) }}
          ports:
            - containerPort: {{ $svc.port }}
              name: http
          env:
            - name: AUTH_SERVICE_URL
              value: "http://auth-svc.{{ $g.namespace }}.svc.cluster.local:{{ .Values.auth.port }}"
            - name: LOGISTICS_SERVICE_URL
              value: "http://logistics-svc.{{ $g.namespace }}.svc.cluster.local:{{ .Values.logistics.port }}"
            - name: WALLET_SERVICE_URL
              value: "http://wallet-svc.{{ $g.namespace }}.svc.cluster.local:{{ .Values.wallet.port }}"
            {{- include "ultra-sync.otelEnv" . | nindent 12 }}
          livenessProbe:
            httpGet: { path: /health, port: {{ $svc.port }} }
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /health, port: {{ $svc.port }} }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources: {{- toYaml $svc.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-svc
  namespace: {{ $g.namespace }}
  labels:
    {{- include "ultra-sync.labels" . | nindent 4 }}
spec:
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 80
      targetPort: {{ $svc.port }}
  type: ClusterIP
{{- if $svc.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ultra-sync-ingress
  namespace: {{ $g.namespace }}
  annotations:
    cert-manager.io/cluster-issuer: {{ $svc.ingress.clusterIssuer }}
spec:
  ingressClassName: nginx
  tls:
    - hosts: [{{ $svc.ingress.host }}]
      secretName: {{ $svc.ingress.tlsSecret }}
  rules:
    - host: {{ $svc.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway-svc
                port: { number: 80 }
{{- end }}
