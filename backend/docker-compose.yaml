version: "3.9"

services:
  # ============================================================
  # Databases (one per service — no cross-service DB access)
  # ============================================================

  authdb:
    image: postgis/postgis:16-3.4-alpine
    container_name: ultra_authdb
    environment:
      POSTGRES_DB: authdb
      POSTGRES_USER: authuser
      POSTGRES_PASSWORD: authpass
    ports:
      - "5432:5432"
    volumes:
      - authdb_data:/var/lib/postgresql/data
      - ./services/auth/internal/adapter/db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "authuser", "-d", "authdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  logisticsdb:
    image: postgis/postgis:16-3.4-alpine
    container_name: ultra_logisticsdb
    environment:
      POSTGRES_DB: logisticsdb
      POSTGRES_USER: logisticsuser
      POSTGRES_PASSWORD: logisticspass
    ports:
      - "5433:5432"
    volumes:
      - logisticsdb_data:/var/lib/postgresql/data
      - ./services/logistics/internal/adapter/db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "logisticsuser", "-d", "logisticsdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  walletdb:
    image: postgres:16-alpine
    container_name: ultra_walletdb
    environment:
      POSTGRES_DB: walletdb
      POSTGRES_USER: walletuser
      POSTGRES_PASSWORD: walletpass
    ports:
      - "5434:5432"
    volumes:
      - walletdb_data:/var/lib/postgresql/data
      - ./services/wallet/internal/adapter/db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "walletuser", "-d", "walletdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ============================================================
  # Cache & Session Store
  # ============================================================

  redis:
    image: redis:7.2-alpine
    container_name: ultra_redis
    command: redis-server --appendonly yes --requirepass redispass
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redispass", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ============================================================
  # Message Broker (Kafka)
  # ============================================================

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: ultra_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: ultra_kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ============================================================
  # Secrets Management
  # ============================================================

  vault:
    image: hashicorp/vault:1.16
    container_name: ultra_vault
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ultra-sync-dev-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    command: server -dev
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://localhost:8200"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ============================================================
  # Observability Stack
  # ============================================================

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: ultra_jaeger
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: ultra_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'

  grafana:
    image: grafana/grafana:10.4.2
    container_name: ultra_grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./configs/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

# ============================================================
# Volumes
# ============================================================

volumes:
  authdb_data:
  logisticsdb_data:
  walletdb_data:
  redis_data:
  grafana_data:
