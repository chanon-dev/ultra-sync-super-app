global:
  namespace: ultra-sync
  imageRegistry: ghcr.io/chanon/ultra-sync
  imageTag: latest
  otelEndpoint: "http://jaeger:4318"

apiGateway:
  replicaCount: 2
  image: api-gateway
  port: 8080
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 256Mi }
  ingress:
    enabled: true
    host: api.ultra-sync.example.com
    tlsSecret: ultra-sync-tls
    clusterIssuer: letsencrypt-prod

auth:
  replicaCount: 2
  image: auth
  port: 8081
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 256Mi }
  secrets:
    existingSecret: auth-secrets
    dbDsnKey: db-dsn
    redisUrlKey: redis-url

logistics:
  replicaCount: 2
  image: logistics
  port: 8082
  resources:
    requests: { cpu: 150m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 256Mi }
  secrets:
    existingSecret: logistics-secrets
    dbDsnKey: db-dsn
    redisUrlKey: redis-url

wallet:
  replicaCount: 2
  image: wallet
  port: 8083
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 256Mi }
  secrets:
    existingSecret: wallet-secrets
    dbDsnKey: db-dsn
