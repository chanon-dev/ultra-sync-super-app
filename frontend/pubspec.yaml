name: ultra_sync
description: Ultra-Sync Super App — Logistics, Wallet, and Real-time Chat
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.1.1
  bloc: ^9.2.1
  equatable: ^2.0.5

  # Dependency Injection
  get_it: ^9.2.1
  injectable: ^3.0.0

  # Network
  dio: ^5.4.3

  # Local Storage
  flutter_secure_storage: ^10.2.0
  shared_preferences: ^2.2.3

  # Routing
  go_router: ^17.2.3

  # Code Generation helpers
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Maps & Location
  google_maps_flutter: ^2.6.1
  geolocator: ^14.0.2

  # Biometrics
  local_auth: ^3.0.1

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0

  # WebSocket
  web_socket_channel: ^3.0.0

  # Environment
  flutter_dotenv: ^6.0.1

  # Utilities
  intl: ^0.19.0
  rxdart: ^0.28.0

  # UI utilities
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  gap: ^3.0.1
  fpdart: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.9
  freezed: ^3.0.0
  json_serializable: ^6.7.6
  injectable_generator: ^3.0.2
  bloc_test: ^10.0.0
  mocktail: ^1.0.3
  patrol: ^4.5.0
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/animations/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
